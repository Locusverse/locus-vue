          "@type": "Offer",

          "price": "39",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "billingDuration": "P1M"
          },

        }
      ],
      "featureList": [
        "Live GPS Tracking",
        "AI Route Optimization",

        "Proof of Delivery",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "areaServed": [
        { "@type": "Country", "name": "Nigeria" },
        { "@type": "Country", "name": "Ghana" },
        { "@type": "Country", "name": "Kenya" },
        { "@type": "Country", "name": "South Africa" },
        { "@type": "Country", "name": "Tanzania" },
        { "@type": "Country", "name": "Rwanda" }
      ],
      "sameAs": []
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How quickly can I get started with Locusverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can sign up and start tracking deliveries within minutes. Add your drivers by phone number, create your first delivery, and watch it appear on your live map. No hardware installation or complex setup required."
          }
        },
        {
          "@type": "Question",
          "name": "Do my drivers need to download an app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For basic tracking, drivers just need any Android phone — no app download required. For advanced features like proof of delivery and voice check-ins, they can install our lightweight driver app (under 15MB) from the Play Store."
          }
        },
        {
          "@type": "Question",
          "name": "Is the Starter plan really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, completely free with no credit card required. You get up to 100 deliveries per month, 3 drivers, live GPS tracking, and basic route planning."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI route optimization work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our routing engine analyzes real-time traffic data, historical road patterns, driver locations, vehicle capacity, and delivery time windows. It then calculates the optimal sequence and route for all pending deliveries — updating in real time as conditions change."
          }
        },
        {
          "@type": "Question",
          "name": "Does Locusverse work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Our offline-first architecture means drivers continue to be tracked even during connectivity gaps. GPS coordinates, proof of delivery captures, and status updates are queued locally and synced automatically when the connection returns."
          }
        },
        {
          "@type": "Question",
          "name": "Which African cities do you support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Locusverse operates in 30+ cities across Nigeria, Ghana, Kenya, South Africa, Tanzania, and Rwanda — with more launching monthly."
          }
        }
      ]
    }
    </script>
